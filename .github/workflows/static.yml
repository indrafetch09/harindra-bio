# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read   # Diperlukan oleh actions/checkout untuk membaca kode Anda
  pages: write     # KRITIS: Diperlukan untuk mengunggah dan mempublikasikan ke Pages
  id-token: write  # Diperlukan untuk autentikasi OIDC (metode deployment modern)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Setup Node (Opsional, tapi penting untuk menjalankan Vite)
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      # 2. Checkout Kode
      - uses: actions/checkout@v3

      # 3. Instal Dependencies dan Lakukan Build Vite
      - name: Install dependencies
        run: npm install
        
      - name: Build project with Vite
        run: npm run build # Ini akan membuat folder 'dist/'

      # 4. Konfigurasi GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v3
        
      # 5. Upload Artifact (mengambil folder 'dist/')
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # PASTIKAN INI ADALAH FOLDER OUTPUT VITE

  # Job terpisah untuk Deployment
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # Pastikan deployment menunggu build selesai
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3 # Melakukan deployment
